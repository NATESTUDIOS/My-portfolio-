<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio - Exploits</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap');
    * { font-family: 'Inter', system-ui, sans-serif; }
    .portfolio-container {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
    }
    .project-card {
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .project-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -12px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <div id="app" class="portfolio-container">
    <!-- Loading State -->
    <div class="flex items-center justify-center min-h-screen">
      <div class="text-white text-center">
        <i class="fas fa-spinner fa-spin text-4xl mb-4"></i>
        <p>Loading portfolio...</p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://myexploits.vercel.app/api';
    
    async function loadPortfolio() {
      const path = window.location.pathname;
      const username = path.split('/').pop();
      
      if (!username) {
        window.location.href = '/';
        return;
      }
      
      try {
        // Fetch portfolio data
        const response = await fetch(`${API_BASE}/auth?user_tag=${username}`);
        
        if (!response.ok) {
          if (response.status === 404) {
            renderNotFound();
          } else {
            throw new Error('Failed to load portfolio');
          }
          return;
        }
        
        const user = await response.json();
        
        // Check portfolio type
        const portfolio = user.portfolio || { type: 'none' };
        
        if (portfolio.type === 'hosted' && portfolio.content) {
          // Render hosted HTML content
          document.getElementById('app').innerHTML = portfolio.content;
          // Add analytics tracking if enabled
          trackVisit(user.userId, 'portfolio');
        } else if (portfolio.type === 'redirect' && portfolio.redirect_url) {
          // Redirect to external URL
          window.location.href = portfolio.redirect_url;
        } else {
          // Render minimal profile
          renderMinimalProfile(user);
          trackVisit(user.userId, 'portfolio');
        }
      } catch (error) {
        console.error('Error loading portfolio:', error);
        renderError();
      }
    }
    
    async function renderMinimalProfile(user) {
      // Fetch user's public projects
      let projects = [];
      try {
        const projectsResponse = await fetch(`${API_BASE}/projects?action=public&user_tag=${user.user_tag}`);
        const projectsData = await projectsResponse.json();
        projects = projectsData.projects || [];
      } catch (error) {
        console.error('Error loading projects:', error);
      }
      
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="max-w-6xl mx-auto px-4 py-12">
          <!-- Profile Header -->
          <div class="glass-card rounded-2xl p-8 mb-8 text-center">
            <img src="${user.icon || 'https://picsum.photos/200/200'}" 
                 class="w-32 h-32 rounded-full mx-auto mb-4 border-4 border-white shadow-lg object-cover">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">${user.user_tag}</h1>
            <p class="text-gray-600 max-w-2xl mx-auto">${user.description || 'Creative developer & designer'}</p>
            <div class="mt-4 flex gap-3 justify-center">
              <a href="/" class="text-blue-600 hover:text-blue-700 text-sm">
                <i class="fas fa-home"></i> Exploits
              </a>
              <span class="text-gray-300">•</span>
              <span class="text-gray-500 text-sm">
                <i class="fas fa-calendar-alt"></i> Member since ${new Date(user.created_at).getFullYear()}
              </span>
            </div>
          </div>
          
          <!-- Projects Grid -->
          <div class="mb-8">
            <h2 class="text-2xl font-bold text-white mb-6">Featured Projects</h2>
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
              ${projects.length > 0 ? projects.map(project => `
                <div class="bg-white rounded-xl overflow-hidden shadow-lg project-card">
                  <img src="${project.image}" class="w-full h-48 object-cover" onerror="this.src='https://picsum.photos/400/300'">
                  <div class="p-5">
                    <div class="flex items-center gap-2 mb-2">
                      <span class="text-xs px-2 py-1 rounded-full ${project.type === 'hosted' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}">
                        ${project.type === 'hosted' ? 'Hosted' : project.type === 'link' ? 'External Link' : 'Image'}
                      </span>
                      <span class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded-full">${project.visibility}</span>
                    </div>
                    <h3 class="font-bold text-lg mb-2">${project.name}</h3>
                    <p class="text-gray-600 text-sm mb-4">${project.description || 'No description available'}</p>
                    ${project.hosted_url ? 
                      `<a href="${project.hosted_url}" target="_blank" class="inline-flex items-center gap-2 text-blue-600 hover:text-blue-700 text-sm font-medium">
                        View Project <i class="fas fa-arrow-right"></i>
                      </a>` : 
                      project.type === 'link' && project.content ?
                      `<a href="${project.content}" target="_blank" class="inline-flex items-center gap-2 text-blue-600 hover:text-blue-700 text-sm font-medium">
                        Visit Link <i class="fas fa-external-link-alt"></i>
                      </a>` :
                      `<span class="text-gray-400 text-sm">Preview only</span>`
                    }
                  </div>
                </div>
              `).join('') : `
                <div class="col-span-full text-center py-12 bg-white/50 backdrop-blur rounded-xl">
                  <i class="fas fa-folder-open text-4xl text-gray-400 mb-3"></i>
                  <p class="text-gray-600">No public projects yet</p>
                </div>
              `}
            </div>
          </div>
          
          <!-- Footer -->
          <div class="text-center text-white/70 text-sm">
            <p>Portfolio powered by <a href="/" class="text-white hover:underline">Exploits</a></p>
          </div>
        </div>
      `;
    }
    
    function renderNotFound() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="flex items-center justify-center min-h-screen">
          <div class="text-center text-white">
            <i class="fas fa-user-slash text-6xl mb-4"></i>
            <h1 class="text-3xl font-bold mb-2">Portfolio Not Found</h1>
            <p class="text-white/80 mb-6">The user you're looking for doesn't exist or hasn't set up their portfolio yet.</p>
            <a href="/" class="inline-flex items-center gap-2 bg-white text-purple-600 px-6 py-3 rounded-full font-semibold hover:shadow-lg transition">
              <i class="fas fa-home"></i> Return Home
            </a>
          </div>
        </div>
      `;
    }
    
    function renderError() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="flex items-center justify-center min-h-screen">
          <div class="text-center text-white">
            <i class="fas fa-exclamation-triangle text-6xl mb-4"></i>
            <h1 class="text-3xl font-bold mb-2">Something Went Wrong</h1>
            <p class="text-white/80 mb-6">Unable to load this portfolio. Please try again later.</p>
            <a href="/" class="inline-flex items-center gap-2 bg-white text-purple-600 px-6 py-3 rounded-full font-semibold hover:shadow-lg transition">
              <i class="fas fa-home"></i> Return Home
            </a>
          </div>
        </div>
      `;
    }
    
    async function trackVisit(userId, type) {
      try {
        // Simple visit tracking (you can implement analytics here)
        console.log(`Visit tracked: ${userId} - ${type}`);
      } catch (error) {
        console.error('Tracking error:', error);
      }
    }
    
    loadPortfolio();
  </script>
</body>
</html>
