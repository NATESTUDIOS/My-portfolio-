<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio - Exploits</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap');
    * { font-family: 'Inter', system-ui, sans-serif; }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
    }

    .project-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .project-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.25);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in {
      animation: fadeIn 0.6s ease-out;
    }
  </style>
</head>
<body>
  <div id="app" class="min-h-screen">
    <!-- Loading State -->
    <div class="flex items-center justify-center min-h-screen">
      <div class="text-center text-white">
        <i class="fas fa-spinner fa-spin text-5xl mb-4"></i>
        <p class="text-lg">Loading portfolio...</p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://myexploits.vercel.app/api';

    // Get user_slug from URL query parameter
    function getUserSlug() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('user_slug');
    }

    // Fetch user data from auth API using the profile endpoint
    async function fetchUserData(userSlug) {
      try {
        const response = await fetch(`${API_BASE}/auth?action=profile&user_tag=${userSlug}`);
        
        if (!response.ok) {
          if (response.status === 404) {
            throw new Error('User not found');
          }
          throw new Error(`Failed to fetch user data: ${response.status}`);
        }
        
        const data = await response.json();
        console.log('User data loaded:', data);
        return data;
      } catch (error) {
        console.error('Error fetching user data:', error);
        throw error;
      }
    }

    // Fetch user's public projects
    async function fetchUserProjects(userSlug) {
      try {
        const response = await fetch(`${API_BASE}/projects?action=public&user_tag=${userSlug}`);
        
        if (!response.ok) {
          console.warn('Projects API returned:', response.status);
          return [];
        }
        
        const data = await response.json();
        console.log('Projects loaded:', data.projects?.length || 0, 'projects');
        return data.projects || [];
      } catch (error) {
        console.error('Error fetching projects:', error);
        return [];
      }
    }

    // Render error state
    function renderError(message) {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="flex items-center justify-center min-h-screen p-4">
          <div class="glass-card max-w-md w-full p-8 text-center fade-in">
            <div class="w-20 h-20 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-4">
              <i class="fas fa-exclamation-triangle text-red-500 text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Portfolio Not Found</h2>
            <p class="text-gray-600 mb-6">${escapeHtml(message)}</p>
            <div class="space-y-3">
              <a href="/" class="block w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white px-6 py-3 rounded-xl font-semibold hover:shadow-lg transition">
                <i class="fas fa-home mr-2"></i> Return Home
              </a>
              <a href="/login" class="block w-full bg-gray-200 text-gray-700 px-6 py-3 rounded-xl font-semibold hover:bg-gray-300 transition">
                <i class="fas fa-rocket mr-2"></i> Create Your Portfolio
              </a>
            </div>
          </div>
        </div>
      `;
    }

    // Render beautiful portfolio from JSON data
    function renderPortfolioFromJSON(user, projects) {
      const app = document.getElementById('app');
      
      // Calculate stats
      const totalProjects = projects.length;
      const hostedProjects = projects.filter(p => p.type === 'hosted').length;
      const linkProjects = projects.filter(p => p.type === 'link').length;
      const imageProjects = projects.filter(p => p.type === 'image').length;
      
      // Format join date
      const joinDate = user.created_at ? new Date(user.created_at).toLocaleDateString('en-US', { 
        month: 'long', 
        year: 'numeric' 
      }) : 'Recently';
      
      // Get portfolio type from user data
      const portfolioType = user.portfolio?.type || 'none';
      
      app.innerHTML = `
        <div class="max-w-7xl mx-auto px-4 py-8 md:py-12">
          <!-- Hero Section -->
          <div class="glass-card rounded-2xl p-6 md:p-8 mb-8 fade-in">
            <div class="flex flex-col md:flex-row items-center gap-8">
              <!-- Avatar -->
              <div class="relative">
                <img src="${user.icon || 'https://picsum.photos/200/200'}" 
                     class="w-32 h-32 md:w-40 md:h-40 rounded-full object-cover border-4 border-white shadow-xl"
                     onerror="this.src='https://ui-avatars.com/api/?name=${user.user_tag}&background=667eea&color=fff&size=200&bold=true'">
                <div class="absolute -bottom-2 -right-2 bg-green-500 rounded-full p-2 shadow-lg">
                  <i class="fas fa-check-circle text-white text-sm"></i>
                </div>
              </div>
              
              <!-- User Info -->
              <div class="flex-1 text-center md:text-left">
                <div class="flex flex-col md:flex-row md:items-center gap-3 mb-2">
                  <h1 class="text-3xl md:text-4xl font-bold text-gray-800">${escapeHtml(user.user_tag)}</h1>
                  <span class="inline-flex items-center gap-1 px-3 py-1 bg-gradient-to-r from-blue-500 to-purple-500 text-white rounded-full text-sm self-center md:self-auto">
                    <i class="fas fa-star text-xs"></i> Portfolio
                  </span>
                </div>
                <p class="text-gray-600 text-lg mb-4 max-w-2xl">${escapeHtml(user.description || 'Creative developer & designer passionate about building amazing digital experiences.')}</p>
                
                <!-- Stats -->
                <div class="flex flex-wrap gap-4 justify-center md:justify-start">
                  <div class="flex items-center gap-2 text-gray-600">
                    <i class="fas fa-calendar-alt text-blue-500"></i>
                    <span class="text-sm">Joined ${joinDate}</span>
                  </div>
                  <div class="flex items-center gap-2 text-gray-600">
                    <i class="fas fa-folder-open text-purple-500"></i>
                    <span class="text-sm">${totalProjects} Projects</span>
                  </div>
                  <div class="flex items-center gap-2 text-gray-600">
                    <i class="fas fa-code text-green-500"></i>
                    <span class="text-sm">${hostedProjects} Hosted</span>
                  </div>
                  <div class="flex items-center gap-2 text-gray-600">
                    <i class="fas fa-external-link-alt text-orange-500"></i>
                    <span class="text-sm">${linkProjects} Links</span>
                  </div>
                </div>
                
                <!-- Portfolio Status Badge -->
                <div class="mt-4 inline-flex items-center gap-2 bg-gray-100 rounded-lg px-3 py-1.5">
                  <i class="fas ${portfolioType === 'hosted' ? 'fa-code' : portfolioType === 'redirect' ? 'fa-external-link-alt' : 'fa-user'} text-gray-500 text-sm"></i>
                  <span class="text-xs text-gray-600">Portfolio Mode: ${portfolioType === 'hosted' ? 'Custom HTML' : portfolioType === 'redirect' ? 'Redirect' : 'Minimal Profile'}</span>
                </div>
                
                <!-- Portfolio URL Badge -->
                <div class="mt-3 inline-flex items-center gap-2 bg-gray-100 rounded-lg px-3 py-1.5">
                  <i class="fas fa-link text-gray-500 text-sm"></i>
                  <code class="text-xs text-gray-600">myexploits.vercel.app/portfolio?user_slug=${user.user_tag}</code>
                  <button onclick="copyUrl()" class="text-blue-500 hover:text-blue-600 text-sm ml-2">
                    <i class="fas fa-copy"></i>
                  </button>
                </div>
              </div>
              
              <!-- CTA Button -->
              <div class="md:self-start">
                <a href="/login" class="inline-flex items-center gap-2 bg-gradient-to-r from-blue-600 to-purple-600 text-white px-6 py-3 rounded-xl font-semibold hover:shadow-lg transition transform hover:scale-105">
                  <i class="fas fa-rocket"></i> Create Yours
                </a>
              </div>
            </div>
          </div>
          
          <!-- Projects Section -->
          <div class="mb-12 fade-in" style="animation-delay: 0.2s">
            <div class="flex justify-between items-center mb-6">
              <h2 class="text-2xl md:text-3xl font-bold text-white">
                <i class="fas fa-code mr-3"></i>Featured Projects
              </h2>
              ${totalProjects > 0 ? `
                <div class="flex gap-2">
                  <button onclick="filterProjects('all')" class="filter-btn active px-4 py-2 rounded-lg bg-white/20 backdrop-blur text-white text-sm font-medium hover:bg-white/30 transition">
                    All (${totalProjects})
                  </button>
                  <button onclick="filterProjects('hosted')" class="filter-btn px-4 py-2 rounded-lg bg-white/10 backdrop-blur text-white/80 text-sm font-medium hover:bg-white/20 transition">
                    Hosted (${hostedProjects})
                  </button>
                  <button onclick="filterProjects('link')" class="filter-btn px-4 py-2 rounded-lg bg-white/10 backdrop-blur text-white/80 text-sm font-medium hover:bg-white/20 transition">
                    Links (${linkProjects})
                  </button>
                </div>
              ` : ''}
            </div>
            
            <div id="projectsGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
              ${totalProjects > 0 ? projects.map(project => `
                <div class="project-card bg-white rounded-xl overflow-hidden shadow-lg cursor-pointer" data-type="${project.type}" data-visibility="${project.visibility}" onclick="viewProject('${project.user_id}', '${project.slug}')">
                  <div class="relative overflow-hidden">
                    <img src="${project.image}" class="w-full h-48 object-cover transform group-hover:scale-110 transition-transform duration-500" onerror="this.src='https://picsum.photos/400/300?random=1'">
                    <div class="absolute top-3 right-3 flex gap-2">
                      <span class="px-2 py-1 rounded-lg text-xs font-semibold shadow-lg ${project.type === 'hosted' ? 'bg-gradient-to-r from-purple-500 to-pink-500 text-white' : project.type === 'link' ? 'bg-gradient-to-r from-blue-500 to-cyan-500 text-white' : 'bg-gradient-to-r from-green-500 to-emerald-500 text-white'}">
                        ${project.type === 'hosted' ? '<i class="fas fa-code mr-1"></i> Hosted' : project.type === 'link' ? '<i class="fas fa-external-link-alt mr-1"></i> Link' : '<i class="fas fa-image mr-1"></i> Image'}
                      </span>
                    </div>
                  </div>
                  <div class="p-5">
                    <h3 class="font-bold text-xl mb-2 text-gray-800 line-clamp-1">${escapeHtml(project.name)}</h3>
                    <p class="text-gray-600 text-sm mb-4 line-clamp-2">${escapeHtml(project.description || 'No description available.')}</p>
                    
                    <div class="flex items-center justify-between">
                      <div class="flex items-center gap-2 text-sm text-gray-500">
                        <i class="far fa-calendar-alt"></i>
                        <span>${new Date(project.created_at).toLocaleDateString()}</span>
                      </div>
                      <button class="text-blue-600 hover:text-purple-600 text-sm font-medium transition">
                        View Project <i class="fas fa-arrow-right ml-1"></i>
                      </button>
                    </div>
                  </div>
                </div>
              `).join('') : `
                <div class="col-span-full">
                  <div class="glass-card p-12 text-center">
                    <div class="w-24 h-24 rounded-full bg-gradient-to-br from-blue-400 to-purple-500 flex items-center justify-center mx-auto mb-4 shadow-lg">
                      <i class="fas fa-paintbrush text-white text-3xl"></i>
                    </div>
                    <h3 class="text-xl font-semibold text-gray-700 mb-2">No Public Projects Yet</h3>
                    <p class="text-gray-500 mb-4 max-w-md mx-auto">This creator is crafting something amazing. Check back soon for updates!</p>
                    <a href="/login" class="inline-flex items-center gap-2 text-blue-600 hover:text-purple-600 font-semibold transition">
                      Create your first project <i class="fas fa-arrow-right"></i>
                    </a>
                  </div>
                </div>
              `}
            </div>
          </div>
          
          <!-- Footer -->
          <div class="text-center text-white/70 text-sm pt-8 border-t border-white/20 fade-in" style="animation-delay: 0.4s">
            <p>Powered by <a href="/" class="text-white hover:underline font-semibold">Exploits</a> — The portfolio platform for developers & designers</p>
            <div class="flex gap-4 justify-center mt-3">
              <a href="/" class="hover:text-white transition">Home</a>
              <a href="/login" class="hover:text-white transition">Get Started</a>
              <a href="/docs" class="hover:text-white transition">Documentation</a>
            </div>
          </div>
        </div>
      `;
    }

    // Project filtering
    window.filterProjects = function(type) {
      const projects = document.querySelectorAll('.project-card');
      const buttons = document.querySelectorAll('.filter-btn');
      
      buttons.forEach(btn => {
        btn.classList.remove('active', 'bg-white/20', 'text-white');
        btn.classList.add('bg-white/10', 'text-white/80');
        if (btn.textContent.toLowerCase().includes(type)) {
          btn.classList.add('active', 'bg-white/20', 'text-white');
          btn.classList.remove('bg-white/10', 'text-white/80');
        }
      });
      
      projects.forEach(project => {
        if (type === 'all' || project.dataset.type === type) {
          project.style.display = 'block';
        } else {
          project.style.display = 'none';
        }
      });
    };

    // View project detail
    window.viewProject = function(userId, projectSlug) {
      window.location.href = `/project/${userId}/${projectSlug}`;
    };

    // Copy URL to clipboard
    window.copyUrl = function() {
      const url = window.location.href;
      navigator.clipboard.writeText(url).then(() => {
        const tooltip = document.createElement('div');
        tooltip.className = 'fixed bottom-4 right-4 bg-green-500 text-white px-4 py-2 rounded-lg shadow-lg text-sm z-50';
        tooltip.innerHTML = '<i class="fas fa-check mr-2"></i>URL copied!';
        document.body.appendChild(tooltip);
        setTimeout(() => tooltip.remove(), 2000);
      });
    };

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Initialize page
    async function init() {
      const userSlug = getUserSlug();
      
      if (!userSlug) {
        renderError('No user specified. Please provide a valid username (e.g., ?user_slug=username).');
        return;
      }
      
      // Show loading with username
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="flex items-center justify-center min-h-screen">
          <div class="text-center text-white">
            <i class="fas fa-spinner fa-spin text-5xl mb-4"></i>
            <p class="text-lg">Loading portfolio for @${escapeHtml(userSlug)}...</p>
          </div>
        </div>
      `;
      
      try {
        // Fetch user data from profile endpoint
        const user = await fetchUserData(userSlug);
        
        // Fetch user's public projects
        const projects = await fetchUserProjects(userSlug);
        
        // Render portfolio using JSON data only
        renderPortfolioFromJSON(user, projects);
        
        // Update page title
        document.title = `${user.user_tag} | Portfolio - Exploits`;
        
        // Add meta description
        let metaDescription = document.querySelector('meta[name="description"]');
        if (!metaDescription) {
          metaDescription = document.createElement('meta');
          metaDescription.name = 'description';
          document.head.appendChild(metaDescription);
        }
        metaDescription.content = user.description || `Check out ${user.user_tag}'s portfolio on Exploits`;
        
      } catch (error) {
        console.error('Error:', error);
        if (error.message === 'User not found') {
          renderError(`User "${escapeHtml(userSlug)}" doesn't exist or hasn't created a portfolio yet.`);
        } else if (error.message.includes('Failed to fetch')) {
          renderError('Unable to connect to the server. Please check your internet connection and try again.');
        } else {
          renderError('Unable to load portfolio. Please try again later.');
        }
      }
    }
    
    // Start the app
    init();
  </script>
</body>
</html>
