<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Link Extractor</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; background: #0f0f0f; color: #fff; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 1px solid #333; background: #222; color: #fff; border-radius: 8px; font-size: 16px; }
        button { padding: 12px 24px; background: #ff0033; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #cc0029; }
        #result { margin-top: 20px; }
        .video-card { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .quality-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #333; margin: 5px 0; border-radius: 6px; }
        .download-btn { background: #007bff; color: white; border: none; padding: 8px 16px; border-radius: 5px; text-decoration: none; cursor: pointer; }
        .error { color: #ff0033; background: #330000; padding: 10px; border-radius: 5px; }
        .loading { color: #aaa; }
    </style>
</head>
<body>
    <h1>🎬 YouTube Link Extractor</h1>
    <p>Paste a YouTube URL to get direct download links. All processing happens in your browser.</p>
    
    <div class="input-group">
        <input type="text" id="youtubeUrl" placeholder="https://www.youtube.com/watch?v=..." />
        <button id="extractBtn">Extract Links</button>
    </div>
    
    <div id="result"></div>

    <script>
        document.getElementById('extractBtn').addEventListener('click', extractVideoData);
        document.getElementById('youtubeUrl').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') extractVideoData();
        });

        function extractVideoId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/)([^&\n?#]+)/,
                /youtube\.com\/shorts\/([^&\n?#]+)/
            ];
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        async function extractVideoData() {
            const url = document.getElementById('youtubeUrl').value.trim();
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p class="loading">Extracting video data...</p>';

            if (!url) {
                resultDiv.innerHTML = '<p class="error">Please enter a YouTube URL.</p>';
                return;
            }

            const videoId = extractVideoId(url);
            if (!videoId) {
                resultDiv.innerHTML = '<p class="error">Invalid YouTube URL. Please check and try again.</p>';
                return;
            }

            try {
                // Fetch the YouTube watch page directly from the user's browser
                const response = await fetch(`https://www.youtube.com/watch?v=${videoId}`, {
                    headers: {
                        'Accept-Language': 'en-US,en;q=0.9',
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`YouTube returned status ${response.status}. The video might be unavailable.`);
                }

                const html = await response.text();
                
                // Extract the ytInitialPlayerResponse JSON object
                const playerResponseMatch = html.match(/ytInitialPlayerResponse\s*=\s*({.+?})\s*;/);
                if (!playerResponseMatch || !playerResponseMatch[1]) {
                    throw new Error('Could not find video data. The page structure might have changed or the video is unavailable.');
                }

                const playerResponse = JSON.parse(playerResponseMatch[1]);

                // Check video availability
                if (playerResponse.playabilityStatus?.status === 'ERROR') {
                    throw new Error(playerResponse.playabilityStatus?.reason || 'This video cannot be played.');
                }

                const videoDetails = playerResponse.videoDetails;
                const formats = [];

                // Collect all available formats
                const addFormats = (formatList) => {
                    if (!formatList) return;
                    formatList.forEach(format => {
                        if (format.url) {
                            formats.push(format);
                        }
                    });
                };

                addFormats(playerResponse.streamingData?.formats);
                addFormats(playerResponse.streamingData?.adaptiveFormats);

                if (formats.length === 0) {
                    throw new Error('No downloadable formats found for this video.');
                }

                // Build the result UI
                let htmlOutput = `
                    <div class="video-card">
                        <h2>${videoDetails?.title || 'Untitled Video'}</h2>
                        <p><strong>Channel:</strong> ${videoDetails?.author || 'Unknown'}</p>
                        <p><strong>Duration:</strong> ${Math.floor(videoDetails?.lengthSeconds / 60)}:${String(videoDetails?.lengthSeconds % 60).padStart(2, '0')}</p>
                        <h3>Available Formats:</h3>
                `;

                // Display high-quality video formats (with video)
                htmlOutput += `<h4>🎥 Video (MP4)</h4>`;
                const videoFormats = formats
                    .filter(f => f.mimeType?.includes('video/mp4') && f.qualityLabel)
                    .sort((a, b) => (b.bitrate || 0) - (a.bitrate || 0));
                
                if (videoFormats.length > 0) {
                    videoFormats.forEach(format => {
                        const sizeMB = format.contentLength ? (format.contentLength / (1024 * 1024)).toFixed(1) + ' MB' : 'Unknown size';
                        htmlOutput += `
                            <div class="quality-item">
                                <span>${format.qualityLabel} (${sizeMB})</span>
                                <a href="${format.url}" class="download-btn" download target="_blank">Download</a>
                            </div>
                        `;
                    });
                } else {
                    htmlOutput += '<p>No video formats found.</p>';
                }

                // Display audio-only formats
                htmlOutput += `<h4>🎵 Audio Only</h4>`;
                const audioFormats = formats
                    .filter(f => f.mimeType?.includes('audio/mp4') && !f.mimeType?.includes('video'))
                    .sort((a, b) => (b.bitrate || 0) - (a.bitrate || 0));
                
                if (audioFormats.length > 0) {
                    audioFormats.forEach(format => {
                        const bitrate = format.bitrate ? (format.bitrate / 1000).toFixed(0) + ' kbps' : 'Unknown bitrate';
                        const sizeMB = format.contentLength ? (format.contentLength / (1024 * 1024)).toFixed(1) + ' MB' : 'Unknown size';
                        htmlOutput += `
                            <div class="quality-item">
                                <span>Audio ${bitrate} (${sizeMB})</span>
                                <a href="${format.url}" class="download-btn" download target="_blank">Download</a>
                            </div>
                        `;
                    });
                } else {
                    htmlOutput += '<p>No separate audio formats found.</p>';
                }

                htmlOutput += '</div>';
                resultDiv.innerHTML = htmlOutput;

            } catch (error) {
                console.error('Extraction failed:', error);
                resultDiv.innerHTML = `<p class="error">❌ ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
