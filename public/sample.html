<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio - Exploits</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    
    :root {
      --primary: #6366f1;
      --secondary: #a855f7;
    }

    * { font-family: 'Plus Jakarta Sans', sans-serif; }

    body {
      background-color: #0f172a;
      background-image: 
        radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
      min-height: 100vh;
      color: #f8fafc;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1.5rem;
    }

    .glass-card-light {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .project-card {
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .project-card:hover {
      transform: translateY(-10px) scale(1.02);
      border-color: rgba(99, 102, 241, 0.4);
      background: rgba(255, 255, 255, 0.07);
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      filter: brightness(1.1);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-up {
      animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }

    .filter-btn.active {
      background: white;
      color: #0f172a;
    }
  </style>
</head>
<body>
  <div id="app" class="min-h-screen">
    <!-- Sophisticated Loading State -->
    <div class="flex items-center justify-center min-h-screen">
      <div class="relative">
        <div class="w-16 h-16 border-4 border-indigo-500/20 border-t-indigo-500 rounded-full animate-spin"></div>
        <div class="mt-4 text-indigo-300 font-medium tracking-wide animate-pulse">Loading experience...</div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://myexploits.vercel.app/api';

    function getUserSlug() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('user_slug');
    }

    async function fetchUserData(userSlug) {
      const response = await fetch(`${API_BASE}/auth?action=profile&user_tag=${userSlug}`);
      if (!response.ok) throw new Error(response.status === 404 ? 'User not found' : 'Fetch error');
      return await response.json();
    }

    async function fetchUserProjects(userSlug) {
      try {
        const response = await fetch(`${API_BASE}/projects?action=public&user_tag=${userSlug}`);
        const data = await response.json();
        return data.projects || [];
      } catch (e) { return []; }
    }

    function renderError(message) {
      document.getElementById('app').innerHTML = `
        <div class="flex items-center justify-center min-h-screen p-6">
          <div class="glass-card max-w-md w-full p-10 text-center animate-up">
            <div class="text-6xl mb-6">orbit</div>
            <h2 class="text-3xl font-bold mb-4">Space Unknown</h2>
            <p class="text-slate-400 mb-8">${escapeHtml(message)}</p>
            <a href="/" class="btn-primary block w-full py-4 rounded-2xl font-bold">Return to Base</a>
          </div>
        </div>
      `;
    }

    function renderPortfolioFromJSON(user, projects) {
      const app = document.getElementById('app');
      const totalProjects = projects.length;
      const joinDate = user.created_at ? new Date(user.created_at).toLocaleDateString('en-US', { month: 'long', year: 'numeric' }) : 'Recently';

      app.innerHTML = `
        <div class="max-w-6xl mx-auto px-6 py-12">
          
          <!-- Hero Section -->
          <header class="glass-card p-8 md:p-12 mb-12 animate-up relative overflow-hidden">
            <div class="absolute top-0 right-0 p-8 opacity-10 pointer-events-none">
                <i class="fas fa-terminal text-9xl"></i>
            </div>
            
            <div class="flex flex-col md:flex-row items-center gap-10">
              <div class="relative group">
                <div class="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-full blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
                <img src="${user.icon || ''}" 
                     class="relative w-32 h-32 md:w-44 md:h-44 rounded-full object-cover border-2 border-white/10 shadow-2xl"
                     onerror="this.src='https://ui-avatars.com/api/?name=${user.user_tag}&background=6366f1&color=fff&size=200&bold=true'">
              </div>
              
              <div class="flex-1 text-center md:text-left">
                <div class="flex flex-wrap items-center justify-center md:justify-start gap-3 mb-4">
                  <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight">${escapeHtml(user.user_tag)}</h1>
                  <span class="px-3 py-1 bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 rounded-full text-xs font-bold uppercase tracking-widest">Verified Creator</span>
                </div>
                
                <p class="text-slate-400 text-lg md:text-xl mb-8 max-w-2xl leading-relaxed">
                  ${escapeHtml(user.description || 'Crafting digital solutions and exploring the boundaries of modern web development.')}
                </p>
                
                <div class="grid grid-cols-2 md:flex flex-wrap gap-4">
                  <div class="glass-card-light px-4 py-2 rounded-xl flex items-center gap-3">
                    <i class="fas fa-calendar-alt text-indigo-400"></i>
                    <span class="text-sm font-medium">Joined ${joinDate}</span>
                  </div>
                  <div class="glass-card-light px-4 py-2 rounded-xl flex items-center gap-3">
                    <i class="fas fa-layer-group text-purple-400"></i>
                    <span class="text-sm font-medium">${totalProjects} Creations</span>
                  </div>
                  <button onclick="copyUrl()" class="glass-card-light px-4 py-2 rounded-xl flex items-center gap-3 hover:bg-white/10 transition">
                    <i class="fas fa-link text-emerald-400"></i>
                    <span class="text-sm font-medium">Copy Profile</span>
                  </button>
                </div>
              </div>
            </div>
          </header>

          <!-- Projects Section -->
          <section class="animate-up" style="animation-delay: 0.2s">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10">
              <h2 class="text-3xl font-bold flex items-center gap-3">
                <span class="w-8 h-1 bg-indigo-500 rounded-full"></span>
                Featured Work
              </h2>
              
              <div class="flex gap-2 p-1 glass-card-light rounded-xl overflow-x-auto w-full md:w-auto">
                <button onclick="filterProjects('all')" class="filter-btn active px-5 py-2 rounded-lg text-sm font-bold transition whitespace-nowrap">All Work</button>
                <button onclick="filterProjects('hosted')" class="filter-btn px-5 py-2 rounded-lg text-sm font-bold text-slate-400 hover:text-white transition whitespace-nowrap">Hosted</button>
                <button onclick="filterProjects('link')" class="filter-btn px-5 py-2 rounded-lg text-sm font-bold text-slate-400 hover:text-white transition whitespace-nowrap">External</button>
              </div>
            </div>
            
            <div id="projectsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
              ${totalProjects > 0 ? projects.map((project, index) => `
                <div class="project-card glass-card flex flex-col h-full group" data-type="${project.type}">
                  <div class="relative aspect-video overflow-hidden rounded-t-2xl">
                    <img src="${project.image}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" onerror="this.src='https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=800&q=80'">
                    <div class="absolute inset-0 bg-gradient-to-t from-slate-950/80 to-transparent opacity-60"></div>
                    <div class="absolute bottom-4 left-4">
                       <span class="px-3 py-1 bg-white/10 backdrop-blur-md border border-white/20 rounded-full text-[10px] font-bold uppercase tracking-widest text-white">
                        ${project.type}
                      </span>
                    </div>
                  </div>
                  
                  <div class="p-6 flex flex-col flex-1">
                    <h3 class="text-xl font-bold mb-3 group-hover:text-indigo-400 transition">${escapeHtml(project.name)}</h3>
                    <p class="text-slate-400 text-sm line-clamp-3 mb-6 leading-relaxed flex-1">
                      ${escapeHtml(project.description || 'No detailed description provided for this project.')}
                    </p>
                    
                    <button onclick="viewProject('${project.user_id}', '${project.slug}')" 
                       class="w-full py-3 rounded-xl bg-white/5 border border-white/10 font-bold text-sm hover:bg-white hover:text-slate-900 transition-all duration-300 flex items-center justify-center gap-2">
                      Explore Project <i class="fas fa-arrow-right text-xs"></i>
                    </button>
                  </div>
                </div>
              `).join('') : `
                <div class="col-span-full py-20 text-center glass-card">
                  <i class="fas fa-rocket-launch text-5xl text-slate-700 mb-4"></i>
                  <h3 class="text-xl font-bold">The lab is quiet...</h3>
                  <p class="text-slate-500">No public projects available at the moment.</p>
                </div>
              `}
            </div>
          </section>

          <!-- Footer -->
          <footer class="mt-24 pt-12 border-t border-white/5 text-center text-slate-500 animate-up" style="animation-delay: 0.4s">
            <p class="mb-4">Designed with excellence via <span class="text-white font-bold">Exploits</span></p>
            <div class="flex justify-center gap-6 text-sm">
              <a href="/" class="hover:text-indigo-400 transition">Network</a>
              <a href="/login" class="hover:text-indigo-400 transition">Create</a>
              <a href="/docs" class="hover:text-indigo-400 transition">Docs</a>
            </div>
          </footer>
        </div>
      `;
    }

    // Helper functions
    window.filterProjects = function(type) {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active', 'bg-white', 'text-slate-900');
        btn.classList.add('text-slate-400');
        if (btn.textContent.toLowerCase().includes(type) || (type === 'all' && btn.textContent.includes('All'))) {
          btn.classList.add('active', 'bg-white', 'text-slate-900');
          btn.classList.remove('text-slate-400');
        }
      });
      
      document.querySelectorAll('.project-card').forEach(card => {
        card.style.display = (type === 'all' || card.dataset.type === type) ? 'flex' : 'none';
      });
    };

    window.viewProject = function(userId, projectSlug) {
      window.location.href = `/project/${userId}/${projectSlug}`;
    };

    window.copyUrl = function() {
      navigator.clipboard.writeText(window.location.href);
      const btn = event.currentTarget;
      const original = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-check text-emerald-400"></i><span class="text-sm font-medium">Copied!</span>';
      setTimeout(() => btn.innerHTML = original, 2000);
    };

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function init() {
      const userSlug = getUserSlug();
      if (!userSlug) return renderError('No astronaut found. Please check the URL.');
      
      try {
        const user = await fetchUserData(userSlug);
        const projects = await fetchUserProjects(userSlug);
        renderPortfolioFromJSON(user, projects);
        document.title = `${user.user_tag} | Profile`;
      } catch (error) {
        renderError(error.message);
      }
    }
    
    init();
  </script>
</body>
</html>
