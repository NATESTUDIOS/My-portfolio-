<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exploits Dashboard — Manage Your Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap');
    * { font-family: 'Inter', system-ui, sans-serif; }
    body { background: #f8fafc; }
    .sidebar-item { transition: all 0.2s; border-left: 3px solid transparent; cursor: pointer; }
    .sidebar-item.active { background: #eff6ff; border-left-color: #3b82f6; color: #1e40af; }
    .sidebar-item:hover:not(.active) { background: #f1f5f9; }
    .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 12px 25px -10px rgba(0,0,0,0.1); }
    .toast { position: fixed; bottom: 24px; right: 24px; z-index: 1000; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; border-radius: 24px; max-width: 600px; width: 90%; max-height: 85vh; overflow-y: auto; }
  </style>
</head>
<body>

  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <aside class="w-72 bg-white shadow-lg border-r border-gray-200 fixed h-full">
      <div class="p-6 border-b border-gray-100">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-purple-600 flex items-center justify-center shadow-md">
            <i class="fas fa-bolt text-white text-lg"></i>
          </div>
          <a href="/" class="font-extrabold text-2xl tracking-tight">exploits<span class="text-blue-600">.</span></a>
        </div>
        <p class="text-xs text-gray-400 mt-2" id="dashboardUserTag">Loading...</p>
      </div>

      <nav class="p-4 flex flex-col gap-1">
        <div data-tab="projects" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-lg font-medium text-gray-700">
          <i class="fas fa-folder-open w-5"></i><span>My Projects</span>
        </div>
        <div data-tab="portfolio" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-lg font-medium text-gray-700">
          <i class="fas fa-user-astronaut w-5"></i><span>Portfolio Settings</span>
        </div>
        <div data-tab="analytics" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-lg font-medium text-gray-700">
          <i class="fas fa-chart-line w-5"></i><span>Analytics</span>
        </div>
        <div data-tab="profile" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-lg font-medium text-gray-700">
          <i class="fas fa-id-card w-5"></i><span>Profile</span>
        </div>
      </nav>

      <div class="absolute bottom-6 left-0 right-0 px-6">
        <button id="logoutBtn" class="w-full flex items-center justify-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2.5 rounded-xl transition">
          <i class="fas fa-sign-out-alt"></i> Sign Out
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 ml-72 p-8 overflow-y-auto">
      <div id="dashboardContent" class="max-w-7xl mx-auto"></div>
    </main>
  </div>

  <div id="toast" class="toast hidden bg-gray-800 text-white px-5 py-3 rounded-xl shadow-lg text-sm"></div>

  <script>
    const API_BASE = 'https://myexploits.vercel.app/api';
    let currentUser = null;
    let activeTab = 'projects';

    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${isError ? 'bg-red-600' : 'bg-green-600'} text-white px-5 py-3 rounded-xl shadow-lg text-sm`;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    function getAuthToken() {
      return localStorage.getItem('exploits_token');
    }

    async function fetchWithAuth(url, options = {}) {
      const token = getAuthToken();
      if (!token) {
        throw new Error('No auth token');
      }

      const headers = {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`,
        ...options.headers
      };

      const response = await fetch(url, { ...options, headers });
      if (response.status === 401) {
        localStorage.clear();
        window.location.href = '/login';
        throw new Error('Session expired');
      }
      return response;
    }

    async function loadUserProfile() {
      const userTag = localStorage.getItem('exploits_user_tag');
      const userId = localStorage.getItem('exploits_user_id');
      const portfolioUrl = localStorage.getItem('exploits_portfolio_url');
      
      if (!userTag || !userId) {
        console.log('Missing auth data, redirecting to login');
        window.location.href = '/login';
        return null;
      }

      try {
        // First, try to get the user profile from the auth endpoint
        const response = await fetch(`${API_BASE}/auth?user_tag=${userTag}`);
        
        if (!response.ok) {
          console.error('Failed to fetch user profile:', response.status);
          // If the endpoint fails, create a minimal user object from localStorage data
          currentUser = {
            user_tag: userTag,
            userId: userId,
            portfolio_url: portfolioUrl,
            icon: 'https://picsum.photos/200/200',
            description: 'Creative developer',
            portfolio: { type: 'none' },
            created_at: new Date().toISOString()
          };
          
          document.getElementById('dashboardUserTag').innerHTML = `<i class="fas fa-at text-xs"></i> @${userTag}`;
          return currentUser;
        }
        
        const data = await response.json();
        
        currentUser = {
          ...data,
          user_tag: userTag,
          userId: userId,
          portfolio_url: portfolioUrl || `https://myexploits.vercel.app/portfolio?user_slug=${userTag}`
        };

        document.getElementById('dashboardUserTag').innerHTML = `<i class="fas fa-at text-xs"></i> @${userTag}`;
        return currentUser;
      } catch (error) {
        console.error('Error loading profile:', error);
        // Create fallback user data
        currentUser = {
          user_tag: userTag,
          userId: userId,
          portfolio_url: portfolioUrl,
          icon: 'https://picsum.photos/200/200',
          description: 'Creative developer',
          portfolio: { type: 'none' },
          created_at: new Date().toISOString()
        };
        document.getElementById('dashboardUserTag').innerHTML = `<i class="fas fa-at text-xs"></i> @${userTag}`;
        return currentUser;
      }
    }

    async function getUserProjects() {
      try {
        const response = await fetchWithAuth(`${API_BASE}/projects?action=list`);
        const data = await response.json();
        return data.projects || [];
      } catch (error) {
        console.error('Error fetching projects:', error);
        return [];
      }
    }

    async function createProject(projectData) {
      const response = await fetchWithAuth(`${API_BASE}/projects?action=create`, {
        method: 'POST',
        body: JSON.stringify(projectData)
      });
      return await response.json();
    }

    async function updateProject(projectSlug, field, value) {
      const response = await fetchWithAuth(`${API_BASE}/projects?action=edit`, {
        method: 'POST',
        body: JSON.stringify({ project_slug: projectSlug, field, value })
      });
      return await response.json();
    }

    async function deleteProject(projectSlug) {
      const response = await fetchWithAuth(`${API_BASE}/projects?action=delete`, {
        method: 'DELETE',
        body: JSON.stringify({ project_slug: projectSlug })
      });
      return await response.json();
    }

    async function getPortfolio() {
      try {
        const response = await fetchWithAuth(`${API_BASE}/auth?action=portfolio`, {
          method: 'POST',
          body: JSON.stringify({ subaction: 'get' })
        });
        const data = await response.json();
        return data.portfolio || { type: 'none' };
      } catch (error) {
        console.error('Error fetching portfolio:', error);
        return { type: 'none' };
      }
    }

    async function updatePortfolio(portfolioType, content, redirectUrl) {
      const payload = {
        subaction: 'update',
        portfolio_type: portfolioType
      };
      if (portfolioType === 'hosted') payload.portfolio_content = content;
      if (portfolioType === 'redirect') payload.portfolio_redirect = redirectUrl;

      const response = await fetchWithAuth(`${API_BASE}/auth?action=portfolio`, {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      return await response.json();
    }

    async function updateProfile(field, value) {
      const response = await fetchWithAuth(`${API_BASE}/auth?action=edit`, {
        method: 'POST',
        body: JSON.stringify({ field, value })
      });
      return await response.json();
    }

    async function getUserAnalytics() {
      try {
        const response = await fetchWithAuth(`${API_BASE}/analytics?action=list`);
        const data = await response.json();
        return data.sessions || [];
      } catch (error) {
        console.error('Error fetching analytics:', error);
        return [];
      }
    }

    async function renderProjects() {
      const container = document.getElementById('dashboardContent');
      container.innerHTML = `
        <div class="flex justify-between items-center mb-6">
          <h1 class="text-3xl font-bold">📁 My Projects</h1>
          <button id="newProjectBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl shadow flex items-center gap-2 transition">
            <i class="fas fa-plus"></i> New Project
          </button>
        </div>
        <div id="projectsGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
      `;

      const projects = await getUserProjects();
      const grid = document.getElementById('projectsGrid');

      if (projects.length === 0) {
        grid.innerHTML = `
          <div class="col-span-full text-center py-16 bg-white rounded-2xl border border-gray-200">
            <i class="fas fa-rocket text-5xl text-gray-300 mb-3"></i>
            <p class="text-gray-500">No projects yet. Create your first project to showcase your work!</p>
          </div>
        `;
      } else {
        grid.innerHTML = projects.map(proj => `
          <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5 card-hover">
            <div class="flex justify-between items-start mb-3">
              <span class="text-xs font-mono bg-gray-100 px-2 py-1 rounded-full">${proj.type}</span>
              <span class="text-xs px-2 py-1 rounded-full ${proj.visibility === 'public' ? 'bg-green-100 text-green-700' : proj.visibility === 'private' ? 'bg-gray-100 text-gray-600' : 'bg-amber-100 text-amber-700'}">
                ${proj.visibility}
              </span>
            </div>
            <img src="${proj.image}" class="w-full h-36 object-cover rounded-xl mb-3" onerror="this.src='https://picsum.photos/400/240'">
            <h3 class="font-bold text-lg">${escapeHtml(proj.name)}</h3>
            <p class="text-gray-500 text-sm mt-1 line-clamp-2">${escapeHtml(proj.description || 'No description')}</p>
            ${proj.hosted_url ? `<a href="${proj.hosted_url}" target="_blank" class="text-blue-600 text-sm flex items-center gap-1 mt-2 hover:underline"><i class="fas fa-external-link-alt"></i> View hosted project</a>` : ''}
            <div class="flex gap-2 mt-4 pt-3 border-t border-gray-100">
              <button data-slug="${proj.slug}" class="editProjectBtn flex-1 text-sm bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg transition">Edit</button>
              <button data-slug="${proj.slug}" class="deleteProjectBtn flex-1 text-sm bg-red-50 text-red-600 hover:bg-red-100 px-3 py-1.5 rounded-lg transition">Delete</button>
            </div>
          </div>
        `).join('');
      }

      document.getElementById('newProjectBtn').onclick = () => openProjectModal();
      document.querySelectorAll('.editProjectBtn').forEach(btn => {
        btn.onclick = () => openProjectModal(btn.dataset.slug);
      });
      document.querySelectorAll('.deleteProjectBtn').forEach(btn => {
        btn.onclick = async () => {
          if (confirm('Delete this project? This action cannot be undone.')) {
            await deleteProject(btn.dataset.slug);
            showToast('Project deleted successfully');
            renderProjects();
          }
        };
      });
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function openProjectModal(slug = null) {
      let project = null;
      if (slug) {
        const projects = await getUserProjects();
        project = projects.find(p => p.slug === slug);
      }

      const modalHtml = `
        <div id="projectModal" class="modal">
          <div class="modal-content p-6">
            <h2 class="text-2xl font-bold mb-4">${project ? 'Edit Project' : 'Create New Project'}</h2>
            <div class="space-y-3">
              <input id="projName" type="text" placeholder="Project Name" class="w-full px-4 py-2 border border-gray-200 rounded-xl" value="${escapeHtml(project?.name || '')}">
              <textarea id="projDesc" placeholder="Description" rows="2" class="w-full px-4 py-2 border border-gray-200 rounded-xl">${escapeHtml(project?.description || '')}</textarea>
              <input id="projImage" type="text" placeholder="Image URL" class="w-full px-4 py-2 border border-gray-200 rounded-xl" value="${project?.image || 'https://picsum.photos/400/240'}">
              <select id="projType" class="w-full px-4 py-2 border border-gray-200 rounded-xl">
                <option value="image" ${project?.type === 'image' ? 'selected' : ''}>Image/Link Project</option>
                <option value="hosted" ${project?.type === 'hosted' ? 'selected' : ''}>Hosted HTML/CSS/JS</option>
                <option value="link" ${project?.type === 'link' ? 'selected' : ''}>Redirect Link</option>
              </select>
              <select id="projVisibility" class="w-full px-4 py-2 border border-gray-200 rounded-xl">
                <option value="public" ${project?.visibility === 'public' ? 'selected' : ''}>Public</option>
                <option value="private" ${project?.visibility === 'private' ? 'selected' : ''}>Private</option>
                <option value="test" ${project?.visibility === 'test' ? 'selected' : ''}>Test</option>
              </select>
              <label class="flex items-center gap-2">
                <input type="checkbox" id="projAnalytics" ${project?.analytics_enabled ? 'checked' : ''}>
                <span class="text-sm">Enable analytics tracking</span>
              </label>
              <div id="hostedContentDiv" class="${project?.type === 'hosted' ? '' : 'hidden'}">
                <label class="block text-sm font-medium mb-1">HTML Content</label>
                <textarea id="projContent" rows="8" class="w-full px-4 py-2 border border-gray-200 rounded-xl font-mono text-sm">${escapeHtml(project?.content || '<div class="p-8 text-center"><h2>✨ My Project</h2><p>Welcome to my hosted project on Exploits!</p></div>')}</textarea>
              </div>
            </div>
            <div class="flex gap-3 mt-6">
              <button id="saveProjectBtn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-xl transition">${project ? 'Update' : 'Create'}</button>
              <button id="closeModalBtn" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 py-2 rounded-xl transition">Cancel</button>
            </div>
          </div>
        </div>
      `;

      document.body.insertAdjacentHTML('beforeend', modalHtml);
      const modal = document.getElementById('projectModal');
      const typeSelect = document.getElementById('projType');
      const hostedDiv = document.getElementById('hostedContentDiv');

      typeSelect.onchange = () => {
        hostedDiv.classList.toggle('hidden', typeSelect.value !== 'hosted');
      };

      document.getElementById('saveProjectBtn').onclick = async () => {
        const name = document.getElementById('projName').value;
        if (!name) {
          showToast('Project name is required', true);
          return;
        }

        const projectData = {
          name,
          description: document.getElementById('projDesc').value,
          image: document.getElementById('projImage').value,
          type: typeSelect.value,
          visibility: document.getElementById('projVisibility').value,
          analytics_enabled: document.getElementById('projAnalytics').checked
        };

        if (typeSelect.value === 'hosted') {
          projectData.content = document.getElementById('projContent').value;
        }

        if (project) {
          for (const [field, value] of Object.entries(projectData)) {
            if (value !== project[field]) {
              await updateProject(project.slug, field, value);
            }
          }
          showToast('Project updated successfully');
        } else {
          await createProject(projectData);
          showToast('Project created successfully');
        }

        modal.remove();
        renderProjects();
      };

      document.getElementById('closeModalBtn').onclick = () => modal.remove();
    }

    async function renderPortfolio() {
      const container = document.getElementById('dashboardContent');
      const portfolio = await getPortfolio();

      container.innerHTML = `
        <h1 class="text-3xl font-bold mb-6">🎨 Portfolio Settings</h1>
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 max-w-3xl">
          <div class="mb-6">
            <label class="block font-semibold mb-2">Portfolio Mode</label>
            <select id="portfolioType" class="w-full px-4 py-2 border border-gray-200 rounded-xl">
              <option value="none" ${portfolio.type === 'none' ? 'selected' : ''}>Minimal Profile (JSON only)</option>
              <option value="hosted" ${portfolio.type === 'hosted' ? 'selected' : ''}>Hosted HTML Portfolio</option>
              <option value="redirect" ${portfolio.type === 'redirect' ? 'selected' : ''}>Redirect to External URL</option>
            </select>
          </div>
          
          <div id="hostedArea" class="mb-6 ${portfolio.type === 'hosted' ? '' : 'hidden'}">
            <label class="block font-semibold mb-2">Portfolio HTML Content</label>
            <textarea id="hostedContent" rows="12" class="w-full px-4 py-3 border border-gray-200 rounded-xl font-mono text-sm">${escapeHtml(portfolio.content || '<div style="text-align:center;padding:40px"><h1>Welcome to my portfolio</h1><p>Built with Exploits</p></div>')}</textarea>
            <p class="text-xs text-gray-400 mt-1">✨ Full HTML/CSS/JS supported. Scripts and styles will be preserved.</p>
          </div>
          
          <div id="redirectArea" class="mb-6 ${portfolio.type === 'redirect' ? '' : 'hidden'}">
            <label class="block font-semibold mb-2">Redirect URL</label>
            <input id="redirectUrl" type="url" class="w-full px-4 py-2 border border-gray-200 rounded-xl" value="${portfolio.redirect_url || ''}" placeholder="https://example.com">
          </div>
          
          <button id="savePortfolioBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl transition">Save Portfolio Settings</button>
          
          <div class="mt-6 pt-6 border-t border-gray-200">
            <p class="text-sm text-gray-600">Your portfolio is live at:</p>
            <a href="${currentUser?.portfolio_url}" target="_blank" class="text-blue-600 hover:underline break-all">${currentUser?.portfolio_url}</a>
          </div>
        </div>
      `;

      const typeSelect = document.getElementById('portfolioType');
      const hostedArea = document.getElementById('hostedArea');
      const redirectArea = document.getElementById('redirectArea');

      typeSelect.onchange = () => {
        hostedArea.classList.toggle('hidden', typeSelect.value !== 'hosted');
        redirectArea.classList.toggle('hidden', typeSelect.value !== 'redirect');
      };

      document.getElementById('savePortfolioBtn').onclick = async () => {
        const type = typeSelect.value;
        let content = null;
        let redirectUrl = null;

        if (type === 'hosted') {
          content = document.getElementById('hostedContent').value;
        } else if (type === 'redirect') {
          redirectUrl = document.getElementById('redirectUrl').value;
        }

        await updatePortfolio(type, content, redirectUrl);
        showToast('Portfolio updated successfully');
        renderPortfolio();
      };
    }

    async function renderAnalytics() {
      const container = document.getElementById('dashboardContent');
      const analytics = await getUserAnalytics();

      container.innerHTML = `
        <h1 class="text-3xl font-bold mb-6">📊 Analytics Dashboard</h1>
        <div id="analyticsGrid" class="grid gap-5"></div>
      `;

      const grid = document.getElementById('analyticsGrid');

      if (analytics.length === 0) {
        grid.innerHTML = `
          <div class="bg-white rounded-2xl p-12 text-center border border-gray-200">
            <i class="fas fa-chart-line text-5xl text-gray-300 mb-3"></i>
            <p class="text-gray-500">No analytics data yet. Enable analytics on your projects to start tracking visits.</p>
          </div>
        `;
      } else {
        grid.innerHTML = analytics.map(session => `
          <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
            <div class="flex justify-between items-start mb-4">
              <h3 class="font-bold text-xl">${escapeHtml(session.project_name)}</h3>
              <span class="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded-full">Tracking Active</span>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-4">
              <div class="bg-gradient-to-br from-blue-50 to-blue-100 p-4 rounded-xl">
                <p class="text-sm text-gray-600">Total Visits</p>
                <p class="text-3xl font-bold text-blue-700">${session.total_visits || 0}</p>
              </div>
              <div class="bg-gradient-to-br from-purple-50 to-purple-100 p-4 rounded-xl">
                <p class="text-sm text-gray-600">Unique Visitors</p>
                <p class="text-3xl font-bold text-purple-700">${session.unique_visitors || 0}</p>
              </div>
            </div>
            <div class="text-sm text-gray-500">
              <i class="fas fa-link"></i> Tracking URL: <code class="text-xs break-all">${session.tracking_url || 'Not configured'}</code>
            </div>
          </div>
        `).join('');
      }
    }

    async function renderProfile() {
      const container = document.getElementById('dashboardContent');
      const user = currentUser;

      container.innerHTML = `
        <h1 class="text-3xl font-bold mb-6">👤 Profile Settings</h1>
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 max-w-2xl">
          <div class="flex items-center gap-6 mb-6">
            <img src="${user?.icon || 'https://picsum.photos/200/200'}" class="w-24 h-24 rounded-full object-cover border-4 border-blue-100">
            <div class="flex-1">
              <label class="block text-sm font-medium mb-1">Profile Icon URL</label>
              <input id="iconUrl" type="text" class="w-full px-4 py-2 border border-gray-200 rounded-xl" value="${user?.icon || ''}">
            </div>
          </div>
          
          <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Username</label>
            <input type="text" class="w-full px-4 py-2 border border-gray-200 rounded-xl bg-gray-50" value="@${user?.user_tag}" disabled>
            <p class="text-xs text-gray-400 mt-1">Your unique portfolio identifier</p>
          </div>
          
          <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Bio / Description</label>
            <textarea id="userBio" rows="4" class="w-full px-4 py-2 border border-gray-200 rounded-xl">${escapeHtml(user?.description || '')}</textarea>
          </div>
          
          <button id="saveProfileBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl transition">Save Profile Changes</button>
        </div>
      `;

      document.getElementById('saveProfileBtn').onclick = async () => {
        const newIcon = document.getElementById('iconUrl').value;
        const newBio = document.getElementById('userBio').value;

        if (newIcon !== currentUser.icon) {
          await updateProfile('icon', newIcon);
          currentUser.icon = newIcon;
        }
        if (newBio !== currentUser.description) {
          await updateProfile('description', newBio);
          currentUser.description = newBio;
        }

        showToast('Profile updated successfully');
        renderProfile();
      };
    }

    async function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.sidebar-item').forEach(item => {
        item.classList.remove('active');
      });
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

      if (tab === 'projects') await renderProjects();
      else if (tab === 'portfolio') await renderPortfolio();
      else if (tab === 'analytics') await renderAnalytics();
      else if (tab === 'profile') await renderProfile();
    }

    async function init() {
      // Check for auth data
      const token = getAuthToken();
      const userTag = localStorage.getItem('exploits_user_tag');
      const userId = localStorage.getItem('exploits_user_id');
      
      if (!token || !userTag || !userId) {
        console.log('No auth data found, redirecting to login');
        window.location.href = '/login';
        return;
      }

      await loadUserProfile();
      if (!currentUser) {
        window.location.href = '/login';
        return;
      }

      document.querySelectorAll('[data-tab]').forEach(item => {
        item.onclick = () => switchTab(item.dataset.tab);
      });

      document.getElementById('logoutBtn').onclick = () => {
        localStorage.clear();
        window.location.href = '/login';
      };

      await switchTab('projects');
    }

    init();
  </script>
</body>
</html>
