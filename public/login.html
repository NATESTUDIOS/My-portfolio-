<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exploits — Sign In to Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap');
    * { font-family: 'Inter', system-ui, sans-serif; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
    }
  </style>
</head>
<body class="flex items-center justify-center p-4">
  <div class="glass-card w-full max-w-md p-8 shadow-2xl">
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-600 to-purple-600 flex items-center justify-center mx-auto shadow-lg">
        <i class="fas fa-bolt text-white text-2xl"></i>
      </div>
      <h1 class="text-3xl font-bold mt-4 text-gray-800">Exploits</h1>
      <p class="text-gray-500 mt-1">Developer portfolio hub</p>
    </div>

    <!-- Tab Navigation -->
    <div class="flex gap-2 mb-6 border-b border-gray-200">
      <button id="loginTab" class="flex-1 py-3 font-semibold text-blue-600 border-b-2 border-blue-600 transition">Sign In</button>
      <button id="registerTab" class="flex-1 py-3 font-semibold text-gray-500 hover:text-gray-700 transition">Create Account</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
        <input type="email" id="loginEmail" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" placeholder="hello@exploits.com">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="loginPassword" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" placeholder="••••••••">
      </div>
      <button id="loginBtn" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-semibold py-3 rounded-xl transition shadow-md">
        Sign In →
      </button>
    </div>

    <!-- Register Form -->
    <div id="registerForm" class="space-y-4 hidden">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username tag</label>
        <input type="text" id="regUserTag" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="alex_dev">
        <p class="text-xs text-gray-400 mt-1">Will be your portfolio URL: exploits.vercel.app/[username]</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" id="regEmail" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="hello@example.com">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="regPassword" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••••">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Bio (optional)</label>
        <textarea id="regDesc" rows="2" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Creative developer & designer"></textarea>
      </div>
      <button id="registerBtn" class="w-full bg-gradient-to-r from-purple-600 to-purple-700 hover:from-purple-700 hover:to-purple-800 text-white font-semibold py-3 rounded-xl transition shadow-md">
        Create Account →
      </button>
    </div>

    <!-- Toast Message -->
    <div id="toast" class="fixed bottom-4 right-4 hidden bg-gray-800 text-white px-5 py-3 rounded-xl shadow-lg text-sm z-50"></div>
  </div>

  <script>
    const API_BASE = 'https://myexploits.vercel.app/api/auth';
    
    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `fixed bottom-4 right-4 ${isError ? 'bg-red-600' : 'bg-green-600'} text-white px-5 py-3 rounded-xl shadow-lg text-sm z-50`;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    function storeAuth(token, userTag, userId, portfolioUrl) {
      localStorage.setItem('exploits_token', token);
      localStorage.setItem('exploits_user_tag', userTag);
      localStorage.setItem('exploits_user_id', userId);
      localStorage.setItem('exploits_portfolio_url', portfolioUrl);
    }

    async function handleLogin(email, password) {
      try {
        const response = await fetch(`${API_BASE}?action=login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || 'Login failed');
        }
        
        storeAuth(data.token, data.user_tag, data.userId, data.portfolio_url);
        showToast('Login successful! Redirecting...');
        setTimeout(() => {
          window.location.href = '/dashboard';
        }, 1000);
      } catch (error) {
        showToast(error.message, true);
      }
    }

    async function handleRegister(email, password, userTag, description) {
      try {
        const response = await fetch(`${API_BASE}?action=create`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            email, 
            password, 
            user_tag: userTag,
            description: description || '',
            portfolio_type: 'none'
          })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || 'Registration failed');
        }
        
        storeAuth(data.token, data.user_tag, data.userId, data.portfolio_url);
        showToast('Account created! Redirecting to dashboard...');
        setTimeout(() => {
          window.location.href = '/dashboard';
        }, 1000);
      } catch (error) {
        showToast(error.message, true);
      }
    }

    // Tab switching
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    
    loginTab.addEventListener('click', () => {
      loginTab.classList.add('text-blue-600', 'border-blue-600');
      loginTab.classList.remove('text-gray-500', 'border-transparent');
      registerTab.classList.remove('text-blue-600', 'border-blue-600');
      registerTab.classList.add('text-gray-500', 'border-transparent');
      loginForm.classList.remove('hidden');
      registerForm.classList.add('hidden');
    });
    
    registerTab.addEventListener('click', () => {
      registerTab.classList.add('text-blue-600', 'border-blue-600');
      registerTab.classList.remove('text-gray-500', 'border-transparent');
      loginTab.classList.remove('text-blue-600', 'border-blue-600');
      loginTab.classList.add('text-gray-500', 'border-transparent');
      registerForm.classList.remove('hidden');
      loginForm.classList.add('hidden');
    });
    
    document.getElementById('loginBtn').addEventListener('click', () => {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) {
        showToast('Please fill in all fields', true);
        return;
      }
      handleLogin(email, password);
    });
    
    document.getElementById('registerBtn').addEventListener('click', () => {
      const userTag = document.getElementById('regUserTag').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      const description = document.getElementById('regDesc').value;
      
      if (!userTag || !email || !password) {
        showToast('Please fill in all required fields', true);
        return;
      }
      
      if (userTag.length < 3) {
        showToast('Username must be at least 3 characters', true);
        return;
      }
      
      handleRegister(email, password, userTag, description);
    });
    
    // Check if already logged in
    const token = localStorage.getItem('exploits_token');
    if (token) {
      window.location.href = '/dashboard';
    }
  </script>
</body>
</html>
