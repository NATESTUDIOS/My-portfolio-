<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exploits — Sign In to Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap');
    * { font-family: 'Inter', system-ui, sans-serif; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
    }
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="flex items-center justify-center p-4">
  <div class="glass-card w-full max-w-md p-8 shadow-2xl">
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-600 to-purple-600 flex items-center justify-center mx-auto shadow-lg">
        <i class="fas fa-bolt text-white text-2xl"></i>
      </div>
      <h1 class="text-3xl font-bold mt-4 text-gray-800">Exploits</h1>
      <p class="text-gray-500 mt-1">Developer portfolio hub</p>
    </div>

    <!-- Tab Navigation -->
    <div class="flex gap-2 mb-6 border-b border-gray-200">
      <button id="loginTab" class="flex-1 py-3 font-semibold text-blue-600 border-b-2 border-blue-600 transition">Sign In</button>
      <button id="registerTab" class="flex-1 py-3 font-semibold text-gray-500 hover:text-gray-700 transition">Create Account</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
        <input type="email" id="loginEmail" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" placeholder="hello@exploits.com">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="loginPassword" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" placeholder="••••••••">
      </div>
      <button id="loginBtn" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-semibold py-3 rounded-xl transition shadow-md flex items-center justify-center gap-2">
        <span>Sign In →</span>
      </button>
      <p class="text-xs text-center text-gray-500 mt-4">
        Demo credentials:<br>
        <span class="font-mono text-blue-600">demo@exploits.com</span> / <span class="font-mono text-blue-600">demo123</span>
      </p>
    </div>

    <!-- Register Form -->
    <div id="registerForm" class="space-y-4 hidden">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username tag</label>
        <input type="text" id="regUserTag" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="alex_dev">
        <p class="text-xs text-gray-400 mt-1">Will be your portfolio URL: myexploits.vercel.app/portfolio?user_slug=username</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" id="regEmail" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="hello@example.com">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="regPassword" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••••">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Bio (optional)</label>
        <textarea id="regDesc" rows="2" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Creative developer & designer"></textarea>
      </div>
      <button id="registerBtn" class="w-full bg-gradient-to-r from-purple-600 to-purple-700 hover:from-purple-700 hover:to-purple-800 text-white font-semibold py-3 rounded-xl transition shadow-md flex items-center justify-center gap-2">
        <span>Create Account →</span>
      </button>
    </div>

    <!-- Toast Message -->
    <div id="toast" class="fixed bottom-4 right-4 hidden bg-gray-800 text-white px-5 py-3 rounded-xl shadow-lg text-sm z-50"></div>
  </div>

  <script>
    const API_BASE = 'https://myexploits.vercel.app/api/auth';
    
    // Disable buttons while loading
    let isLoading = false;

    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `fixed bottom-4 right-4 ${isError ? 'bg-red-600' : 'bg-green-600'} text-white px-5 py-3 rounded-xl shadow-lg text-sm z-50`;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    function setLoading(button, loading) {
      const btn = button;
      if (loading) {
        btn.disabled = true;
        btn.style.opacity = '0.7';
        const originalText = btn.innerHTML;
        btn.setAttribute('data-original-text', originalText);
        btn.innerHTML = '<span class="loading-spinner"></span><span> Loading...</span>';
      } else {
        btn.disabled = false;
        btn.style.opacity = '1';
        const originalText = btn.getAttribute('data-original-text');
        if (originalText) {
          btn.innerHTML = originalText;
        }
      }
    }

    function storeAuth(token, userTag, userId, portfolioUrl) {
      if (!token || !userTag || !userId) {
        console.error('Missing auth data:', { token, userTag, userId });
        throw new Error('Invalid authentication data received');
      }
      
      localStorage.setItem('exploits_token', token);
      localStorage.setItem('exploits_user_tag', userTag);
      localStorage.setItem('exploits_user_id', userId);
      localStorage.setItem('exploits_portfolio_url', portfolioUrl || `https://myexploits.vercel.app/portfolio?user_slug=${userTag}`);
      
      console.log('Auth data stored successfully:', { userTag, userId, portfolioUrl });
    }

    async function handleLogin(email, password) {
      const loginBtn = document.getElementById('loginBtn');
      if (isLoading) return;
      
      isLoading = true;
      setLoading(loginBtn, true);
      
      try {
        console.log('Attempting login for:', email);
        
        const response = await fetch(`${API_BASE}?action=login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();
        console.log('Login response:', data);

        if (!response.ok) {
          throw new Error(data.error || 'Login failed');
        }

        if (!data.token || !data.user_tag || !data.userId) {
          throw new Error('Invalid response from server');
        }

        storeAuth(data.token, data.user_tag, data.userId, data.portfolio_url);
        showToast('Login successful! Redirecting to dashboard...');
        
        setTimeout(() => {
          window.location.href = '/dashboard';
        }, 1000);
      } catch (error) {
        console.error('Login error:', error);
        showToast(error.message, true);
      } finally {
        isLoading = false;
        setLoading(loginBtn, false);
      }
    }

    async function handleRegister(email, password, userTag, description) {
      const registerBtn = document.getElementById('registerBtn');
      if (isLoading) return;
      
      isLoading = true;
      setLoading(registerBtn, true);
      
      try {
        console.log('Attempting registration for:', email, userTag);
        
        const response = await fetch(`${API_BASE}?action=create`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            email, 
            password, 
            user_tag: userTag,
            description: description || '',
            portfolio_type: 'none',
            icon: 'https://picsum.photos/200/200'
          })
        });

        const data = await response.json();
        console.log('Registration response:', data);

        if (!response.ok) {
          throw new Error(data.error || 'Registration failed');
        }

        if (!data.token || !data.user_tag || !data.userId) {
          throw new Error('Invalid response from server');
        }

        storeAuth(data.token, data.user_tag, data.userId, data.portfolio_url);
        showToast('Account created successfully! Redirecting to dashboard...');
        
        setTimeout(() => {
          window.location.href = '/dashboard';
        }, 1000);
      } catch (error) {
        console.error('Registration error:', error);
        showToast(error.message, true);
      } finally {
        isLoading = false;
        setLoading(registerBtn, false);
      }
    }

    // Tab switching
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');

    loginTab.addEventListener('click', () => {
      loginTab.classList.add('text-blue-600', 'border-blue-600');
      loginTab.classList.remove('text-gray-500', 'border-transparent');
      registerTab.classList.remove('text-blue-600', 'border-blue-600');
      registerTab.classList.add('text-gray-500', 'border-transparent');
      loginForm.classList.remove('hidden');
      registerForm.classList.add('hidden');
    });

    registerTab.addEventListener('click', () => {
      registerTab.classList.add('text-blue-600', 'border-blue-600');
      registerTab.classList.remove('text-gray-500', 'border-transparent');
      loginTab.classList.remove('text-blue-600', 'border-blue-600');
      loginTab.classList.add('text-gray-500', 'border-transparent');
      registerForm.classList.remove('hidden');
      loginForm.classList.add('hidden');
    });

    // Handle Enter key press
    document.getElementById('loginEmail').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('loginBtn').click();
      }
    });
    
    document.getElementById('loginPassword').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('loginBtn').click();
      }
    });
    
    document.getElementById('regEmail').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('registerBtn').click();
      }
    });
    
    document.getElementById('regPassword').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('registerBtn').click();
      }
    });

    document.getElementById('loginBtn').addEventListener('click', () => {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      
      if (!email) {
        showToast('Please enter your email address', true);
        return;
      }
      if (!password) {
        showToast('Please enter your password', true);
        return;
      }
      
      handleLogin(email, password);
    });

    document.getElementById('registerBtn').addEventListener('click', () => {
      const userTag = document.getElementById('regUserTag').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const description = document.getElementById('regDesc').value.trim();

      if (!userTag) {
        showToast('Please choose a username', true);
        return;
      }
      if (!email) {
        showToast('Please enter your email address', true);
        return;
      }
      if (!password) {
        showToast('Please create a password', true);
        return;
      }

      if (userTag.length < 3) {
        showToast('Username must be at least 3 characters', true);
        return;
      }
      
      if (userTag.length > 30) {
        showToast('Username must be less than 30 characters', true);
        return;
      }
      
      const validUsernameRegex = /^[a-z0-9]+$/;
      if (!validUsernameRegex.test(userTag.toLowerCase())) {
        showToast('Username can only contain lowercase letters and numbers', true);
        return;
      }
      
      if (password.length < 6) {
        showToast('Password must be at least 6 characters', true);
        return;
      }

      handleRegister(email, password, userTag, description);
    });

    // Check if already logged in and token is valid
    const token = localStorage.getItem('exploits_token');
    const userTag = localStorage.getItem('exploits_user_tag');
    const userId = localStorage.getItem('exploits_user_id');
    
    if (token && userTag && userId) {
      console.log('Found existing session, redirecting to dashboard');
      window.location.href = '/dashboard';
    }
    
    // Clear any invalid auth data on page load
    if (token && (!userTag || !userId)) {
      console.log('Clearing invalid auth data');
      localStorage.clear();
    }
    
    // Add demo credentials for testing
    const demoEmail = 'demo@exploits.com';
    const demoPassword = 'demo123';
    
    // Optional: Auto-fill demo credentials for testing
    if (window.location.search.includes('demo')) {
      document.getElementById('loginEmail').value = demoEmail;
      document.getElementById('loginPassword').value = demoPassword;
    }
  </script>
</body>
</html>
