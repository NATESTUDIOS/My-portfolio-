<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project - Exploits</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div id="app" class="flex items-center justify-center min-h-screen p-4">
    <div class="text-white text-center">
      <i class="fas fa-spinner fa-spin text-4xl mb-4"></i>
      <p>Loading project...</p>
    </div>
  </div>

  <script>
    const API_BASE = 'https://myexploits.vercel.app/api';
    
    async function loadProject() {
      const path = window.location.pathname;
      const parts = path.split('/').filter(p => p);
      
      // Expected format: /portfolio/[userId]/[projectSlug] or /project/[userId]/[projectSlug]
      if (parts.length < 2) {
        renderNotFound();
        return;
      }
      
      const userId = parts[0];
      const projectSlug = parts[1];
      
      try {
        // Fetch project data
        const response = await fetch(`${API_BASE}/projects?user_id=${userId}&project_slug=${projectSlug}`);
        
        if (!response.ok) {
          if (response.status === 404) {
            renderNotFound();
          } else {
            throw new Error('Failed to load project');
          }
          return;
        }
        
        const data = await response.json();
        
        // Check if it's a hosted project
        if (data.content && data.type === 'hosted') {
          // Render hosted HTML content
          document.getElementById('app').innerHTML = data.content;
          trackVisit(data.projectId);
        } else {
          // Render project details page
          renderProjectDetails(data);
          trackVisit(data.projectId);
        }
      } catch (error) {
        console.error('Error loading project:', error);
        renderError();
      }
    }
    
    function renderProjectDetails(project) {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="max-w-4xl mx-auto py-12 px-4">
          <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <img src="${project.image}" class="w-full h-64 object-cover" onerror="this.src='https://picsum.photos/800/400'">
            
            <div class="p-8">
              <div class="flex items-center gap-3 mb-4">
                <span class="px-3 py-1 rounded-full text-sm font-medium ${project.type === 'hosted' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}">
                  ${project.type === 'hosted' ? 'Hosted Project' : project.type === 'link' ? 'External Link' : 'Image Project'}
                </span>
                <span class="px-3 py-1 rounded-full text-sm bg-gray-100 text-gray-600">
                  ${project.visibility === 'public' ? 'Public' : 'Private'}
                </span>
              </div>
              
              <h1 class="text-3xl font-bold text-gray-800 mb-3">${project.name}</h1>
              <p class="text-gray-600 text-lg mb-6">${project.description || 'No description provided.'}</p>
              
              <div class="flex items-center gap-4 mb-6 pt-4 border-t border-gray-100">
                <div class="flex items-center gap-2 text-gray-500">
                  <i class="fas fa-user"></i>
                  <span>By @${project.user_tag}</span>
                </div>
                <div class="flex items-center gap-2 text-gray-500">
                  <i class="fas fa-calendar"></i>
                  <span>${new Date(project.created_at).toLocaleDateString()}</span>
                </div>
              </div>
              
              ${project.type === 'link' && project.content ? `
                <a href="${project.content}" target="_blank" class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-semibold transition shadow-lg">
                  Visit Project <i class="fas fa-external-link-alt"></i>
                </a>
              ` : project.type === 'image' ? `
                <a href="${project.image}" target="_blank" class="inline-flex items-center gap-2 bg-gray-600 hover:bg-gray-700 text-white px-6 py-3 rounded-xl font-semibold transition shadow-lg">
                  View Full Image <i class="fas fa-download"></i>
                </a>
              ` : ''}
              
              <a href="/portfolio/${project.user_tag}" class="inline-flex items-center gap-2 ml-3 text-gray-600 hover:text-gray-800 px-6 py-3 rounded-xl font-medium transition">
                <i class="fas fa-arrow-left"></i> View Creator's Portfolio
              </a>
            </div>
          </div>
          
          <div class="mt-8 text-center text-white/70 text-sm">
            <p>Powered by <a href="/" class="text-white hover:underline">Exploits</a> — Portfolio platform for creators</p>
          </div>
        </div>
      `;
    }
    
    function renderNotFound() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="text-center text-white">
          <i class="fas fa-folder-open text-6xl mb-4"></i>
          <h1 class="text-3xl font-bold mb-2">Project Not Found</h1>
          <p class="text-white/80 mb-6">This project doesn't exist or has been removed.</p>
          <a href="/" class="inline-flex items-center gap-2 bg-white text-purple-600 px-6 py-3 rounded-full font-semibold hover:shadow-lg transition">
            <i class="fas fa-home"></i> Return Home
          </a>
        </div>
      `;
    }
    
    function renderError() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="text-center text-white">
          <i class="fas fa-exclamation-triangle text-6xl mb-4"></i>
          <h1 class="text-3xl font-bold mb-2">Error Loading Project</h1>
          <p class="text-white/80 mb-6">Unable to load this project. Please try again later.</p>
          <a href="/" class="inline-flex items-center gap-2 bg-white text-purple-600 px-6 py-3 rounded-full font-semibold hover:shadow-lg transition">
            <i class="fas fa-home"></i> Return Home
          </a>
        </div>
      `;
    }
    
    async function trackVisit(projectId) {
      try {
        // Track visit via analytics endpoint
        await fetch(`${API_BASE}/analytics?action=track&project_id=${projectId}`, {
          method: 'GET',
          headers: {
            'X-Forwarded-For': 'auto'
          }
        });
      } catch (error) {
        console.error('Tracking error:', error);
      }
    }
    
    loadProject();
  </script>
</body>
</html>
