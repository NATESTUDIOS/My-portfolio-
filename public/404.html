<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Exploits</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap');
    * { font-family: 'Inter', system-ui, sans-serif; }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
  </style>
</head>
<body class="flex items-center justify-center p-4">
  <div class="text-center text-white">
    <div class="mb-8">
      <i class="fas fa-compass text-8xl mb-4 animate-pulse"></i>
    </div>
    <h1 class="text-6xl font-bold mb-4">404</h1>
    <h2 class="text-2xl font-semibold mb-4">Page Not Found</h2>
    <p class="text-white/80 max-w-md mx-auto mb-8">
      Oops! The page you're looking for doesn't exist or has been moved.
    </p>
    <div class="flex gap-4 justify-center flex-wrap">
      <a href="/" class="inline-flex items-center gap-2 bg-white text-purple-600 px-6 py-3 rounded-full font-semibold hover:shadow-lg transition">
        <i class="fas fa-home"></i> Go Home
      </a>
      <a href="/login" class="inline-flex items-center gap-2 bg-white/20 backdrop-blur text-white px-6 py-3 rounded-full font-semibold hover:bg-white/30 transition">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </a>
    </div>
    <div class="mt-12 text-white/60 text-sm">
      <p>© 2025 Exploits — Portfolio platform for creators</p>
    </div>
  </div>
</body>
</html>
